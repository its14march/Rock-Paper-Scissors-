<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>

<!-- Set the theme before paint so there's no flash -->
<script>
    (function () {
        var t;
        try { t = localStorage.getItem('rps-theme'); } catch (e) {}
        if (!t) {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
    })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    /* ─────────────────────────────────────────────
       Design tokens — light first, dark overrides.
       Colours are soft; structure is carried by ink
       neutrals, personality by per-move pastels.
    ───────────────────────────────────────────── */
    :root,
    [data-theme="light"] {
        --bg:           #F4F5F9;
        --bg-glow:      rgba(139,108,240,0.10);
        --surface:      #FFFFFF;
        --line:         #E7E7EF;
        --text:         #1B1C28;
        --text-muted:   #6C6E81;
        --text-faint:   #A6A7B6;

        --ink:          #1B1C28;   /* primary button bg */
        --ink-contrast: #FFFFFF;

        --win:          #15B881;
        --lose:         #EF4E70;
        --tie:          #F2A436;

        --rock:         #F2784B;   /* coral  */
        --paper:        #3B9DF5;   /* sky    */
        --scissors:     #8B6CF0;   /* violet */

        --shadow-sm:    0 4px 14px rgba(20,22,40,0.06);
        --shadow-md:    0 16px 40px rgba(20,22,40,0.12);
    }

    [data-theme="dark"] {
        --bg:           #121219;
        --bg-glow:      rgba(139,108,240,0.18);
        --surface:      #1B1B25;
        --line:         #2C2C3A;
        --text:         #ECEDF3;
        --text-muted:   #9C9DAF;
        --text-faint:   #65677A;

        --ink:          #ECEDF3;
        --ink-contrast: #15161E;

        --win:          #2BCEA2;
        --lose:         #F46583;
        --tie:          #F4B445;

        --rock:         #F2935F;
        --paper:        #5BB0F6;
        --scissors:     #A98BF6;

        --shadow-sm:    0 4px 14px rgba(0,0,0,0.30);
        --shadow-md:    0 18px 44px rgba(0,0,0,0.50);
    }

    :root {
        --radius:    22px;
        --radius-sm: 13px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--text);
        background:
            radial-gradient(900px 480px at 50% -8%, var(--bg-glow), transparent 60%),
            var(--bg);
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 22px;
        transition: background-color .3s ease, color .3s ease;
    }

    .card {
        width: 100%; max-width: 460px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 30px 30px 26px;
        box-shadow: var(--shadow-md);
        transition: background-color .3s ease, border-color .3s ease;
    }

    /* ── Header ── */
    .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .brand h1 {
        font-family: 'Fraunces', serif;
        font-weight: 700; font-size: 1.72rem; line-height: 1.04; letter-spacing: -.5px;
    }
    .brand h1 .w-rock     { color: var(--rock); }
    .brand h1 .w-paper    { color: var(--paper); }
    .brand h1 .w-scissors { color: var(--scissors); }
    .sub { color: var(--text-muted); font-size: .8rem; margin-top: 7px; }

    .theme-toggle {
        flex: none; width: 40px; height: 40px;
        display: grid; place-items: center;
        border-radius: 12px; border: 1px solid var(--line);
        background: var(--surface); color: var(--text-muted);
        cursor: pointer; box-shadow: var(--shadow-sm);
        transition: color .2s, border-color .2s, transform .2s, background-color .3s;
    }
    .theme-toggle:hover { color: var(--text); transform: translateY(-2px); border-color: color-mix(in srgb, var(--text) 22%, var(--line)); }
    .theme-toggle svg { width: 18px; height: 18px; }
    .theme-toggle .sun  { display: none; }
    [data-theme="dark"] .theme-toggle .sun  { display: block; }
    [data-theme="dark"] .theme-toggle .moon { display: none; }

    /* ── Scoreboard ── */
    .score {
        display: flex; align-items: center; justify-content: center; gap: 6px;
        margin: 20px 0 26px; padding: 13px 10px;
        background: var(--surface); border: 1px solid var(--line);
        border-radius: var(--radius); box-shadow: var(--shadow-sm);
        transition: border-color .3s ease;
    }
    .score-cell { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .s-num { font-size: 1.7rem; font-weight: 800; line-height: 1; }
    .s-lbl { font-size: .6rem; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-faint); }
    .score-cell.win  .s-num { color: var(--win); }
    .score-cell.tie  .s-num { color: var(--tie); }
    .score-cell.lose .s-num { color: var(--lose); }
    .sep { width: 1px; height: 30px; background: var(--line); }
    @keyframes bump { 0% { transform: scale(1); } 40% { transform: scale(1.38); } 100% { transform: scale(1); } }
    .s-num.bump { animation: bump .35s ease; }

    /* ── Prompt + choice tiles ── */
    .prompt {
        text-align: center; font-size: .7rem; font-weight: 600;
        letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px;
    }
    .tiles { display: flex; justify-content: center; gap: 13px; }

    .tile {
        position: relative; flex: 1; min-height: 118px;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
        padding: 16px 8px;
        border-radius: var(--radius);
        border: 1.5px solid color-mix(in srgb, var(--c) 22%, var(--line));
        background: color-mix(in srgb, var(--c) 7%, var(--surface));
        color: var(--text); cursor: pointer; font-family: inherit;
        box-shadow: var(--shadow-sm);
        transition: transform .18s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease, opacity .25s ease;
    }
    .tile.rock     { --c: var(--rock); }
    .tile.paper    { --c: var(--paper); }
    .tile.scissors { --c: var(--scissors); }

    .tile-icon { width: 44px; height: 44px; color: var(--c); }
    .tile-icon svg { width: 100%; height: 100%; display: block; }
    .tile .name { font-size: .8rem; font-weight: 600; letter-spacing: .3px; color: var(--text-muted); transition: color .2s; }

    .tile .kbd {
        position: absolute; top: 9px; right: 9px;
        font-size: .58rem; font-weight: 700; line-height: 1; color: var(--text-faint);
        background: color-mix(in srgb, var(--c) 10%, transparent);
        border: 1px solid color-mix(in srgb, var(--c) 22%, var(--line));
        border-radius: 6px; padding: 3px 5px;
    }

    .tile:hover, .tile:focus-visible {
        transform: translateY(-5px);
        background: color-mix(in srgb, var(--c) 14%, var(--surface));
        border-color: color-mix(in srgb, var(--c) 50%, var(--line));
        box-shadow: 0 16px 30px color-mix(in srgb, var(--c) 26%, transparent);
    }
    .tile:hover .name, .tile:focus-visible .name { color: var(--text); }

    .tile.selected {
        transform: translateY(-5px) scale(1.03);
        background: color-mix(in srgb, var(--c) 18%, var(--surface));
        border-color: var(--c);
        box-shadow: 0 16px 34px color-mix(in srgb, var(--c) 34%, transparent);
    }
    .tile.selected .name { color: var(--text); }

    .tiles.busy .tile:not(.selected) { opacity: .42; }
    .tiles.busy .tile { cursor: default; }

    /* ─────────────────────────────────────────────
       Stage — fixed min-height so the card never
       resizes; children fade/slide via opacity only.
    ───────────────────────────────────────────── */
    .stage {
        position: relative; min-height: 252px; margin-top: 28px;
        display: flex; flex-direction: column; align-items: stretch; justify-content: center; gap: 18px;
    }
    .placeholder {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        color: var(--text-faint); font-size: .85rem; transition: opacity .25s; pointer-events: none;
    }
    .placeholder.hide { opacity: 0; }

    /* head-to-head reveal */
    .reveal {
        display: flex; align-items: center; justify-content: center; gap: 16px;
        background: var(--surface); border: 1px solid var(--line);
        border-radius: var(--radius); padding: 18px 14px; box-shadow: var(--shadow-sm);
        opacity: 0; transform: translateY(12px);
        transition: opacity .3s ease, transform .3s ease, border-color .3s ease;
    }
    .stage.show .reveal { opacity: 1; transform: translateY(0); }
    .hand { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .hand .h-lbl { font-size: .58rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint); }
    .hand-icon { width: 54px; height: 54px; }
    .hand-icon svg { width: 100%; height: 100%; display: block; }
    .hand .h-name { font-size: .76rem; font-weight: 600; color: var(--text-muted); text-transform: capitalize; min-height: 1em; }
    .move-rock { color: var(--rock); } .move-paper { color: var(--paper); } .move-scissors { color: var(--scissors); }
    .vs { font-family: 'Fraunces', serif; font-style: italic; font-weight: 600; font-size: 1rem; color: var(--text-faint); }

    @keyframes pop { 0% { transform: scale(.4); opacity: 0; } 55% { transform: scale(1.16); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    .hand-icon.pop { animation: pop .42s cubic-bezier(.34,1.56,.64,1); }

    /* verdict */
    .verdict { text-align: center; opacity: 0; }
    @keyframes rise { 0% { opacity: 0; transform: translateY(8px) scale(.96); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    .verdict.show { opacity: 1; animation: rise .35s cubic-bezier(.34,1.4,.64,1) both; }
    .verdict-text { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.5rem; line-height: 1.1; color: var(--text); }
    .verdict-detail { font-size: .82rem; color: var(--text-muted); margin-top: 4px; }
    .verdict.winner .verdict-text { color: var(--win); }
    .verdict.loser  .verdict-text { color: var(--lose); }
    .verdict.tie    .verdict-text { color: var(--tie); }

    /* actions */
    .actions { display: flex; gap: 10px; justify-content: center; opacity: 0; transform: translateY(8px); transition: opacity .3s ease, transform .3s ease; }
    .actions.show { opacity: 1; transform: translateY(0); }
    .btn-primary {
        border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: .85rem; letter-spacing: .2px;
        padding: 12px 24px; border-radius: var(--radius-sm);
        background: var(--ink); color: var(--ink-contrast); box-shadow: var(--shadow-sm);
        transition: transform .18s, box-shadow .2s, background-color .3s, color .3s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .btn-quiet {
        cursor: pointer; font-family: inherit; font-weight: 600; font-size: .85rem;
        padding: 12px 18px; border-radius: var(--radius-sm);
        background: transparent; color: var(--text-muted); border: 1px solid var(--line);
        transition: color .2s, border-color .2s, transform .18s;
    }
    .btn-quiet:hover { color: var(--text); transform: translateY(-2px); border-color: color-mix(in srgb, var(--text) 22%, var(--line)); }

    /* confetti */
    .confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
    .confetti-piece { position: absolute; width: 8px; height: 13px; border-radius: 2px; will-change: transform, opacity; }
    @keyframes confettiFly {
        0%   { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
        100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(680deg); opacity: 0; }
    }

    /* focus rings on everything interactive */
    .tile:focus-visible, .btn-primary:focus-visible, .btn-quiet:focus-visible, .theme-toggle:focus-visible {
        outline: 2px solid var(--scissors); outline-offset: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important;
        }
    }

    @media (max-width: 420px) {
        .card { padding: 24px 20px 22px; }
        .brand h1 { font-size: 1.5rem; }
        .tile { min-height: 106px; }
        .tile-icon { width: 40px; height: 40px; }
    }
</style>
</head>

<body>
<main class="card" aria-label="Rock Paper Scissors game">

    <!-- Header -->
    <div class="top">
        <div class="brand">
            <h1><span class="w-rock">Rock</span> <span class="w-paper">Paper</span> <span class="w-scissors">Scissors</span></h1>
            <p class="sub">Pick a move and try to outguess the computer</p>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Switch light or dark theme">
            <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
    </div>

    <!-- Scoreboard -->
    <div class="score" aria-label="Score">
        <div class="score-cell win">  <span class="s-num" id="scoreWins">0</span>  <span class="s-lbl">You</span></div>
        <div class="sep"></div>
        <div class="score-cell tie">  <span class="s-num" id="scoreTies">0</span>  <span class="s-lbl">Draws</span></div>
        <div class="sep"></div>
        <div class="score-cell lose"> <span class="s-num" id="scoreLosses">0</span> <span class="s-lbl">CPU</span></div>
    </div>

    <!-- Choices -->
    <p class="prompt" id="prompt">Choose your move</p>
    <div class="tiles" id="tiles" role="group" aria-labelledby="prompt">
        <button class="tile rock" id="tileRock" onclick="playGame('rock')" aria-label="Play rock — shortcut 1">
            <span class="tile-icon" aria-hidden="true"></span>
            <span class="name">Rock</span>
            <span class="kbd" aria-hidden="true">1</span>
        </button>
        <button class="tile paper" id="tilePaper" onclick="playGame('paper')" aria-label="Play paper — shortcut 2">
            <span class="tile-icon" aria-hidden="true"></span>
            <span class="name">Paper</span>
            <span class="kbd" aria-hidden="true">2</span>
        </button>
        <button class="tile scissors" id="tileScissors" onclick="playGame('scissors')" aria-label="Play scissors — shortcut 3">
            <span class="tile-icon" aria-hidden="true"></span>
            <span class="name">Scissors</span>
            <span class="kbd" aria-hidden="true">3</span>
        </button>
    </div>

    <!-- Stage (reserved height → no layout shift) -->
    <section class="stage">
        <div class="confetti" id="confetti" aria-hidden="true"></div>
        <div class="placeholder" id="placeholder">Your match will show up here</div>

        <div class="reveal" id="reveal">
            <div class="hand">
                <span class="h-lbl">You</span>
                <span class="hand-icon" id="userIcon" aria-hidden="true"></span>
                <span class="h-name" id="userChoiceDisplay"></span>
            </div>
            <span class="vs">vs</span>
            <div class="hand">
                <span class="h-lbl">CPU</span>
                <span class="hand-icon" id="cpuIcon" aria-hidden="true"></span>
                <span class="h-name" id="computerChoiceDisplay"></span>
            </div>
        </div>

        <div class="verdict" id="verdict" role="status" aria-live="polite">
            <div class="verdict-text"   id="resultText"></div>
            <div class="verdict-detail" id="resultDetail"></div>
        </div>

        <div class="actions" id="actions">
            <button class="btn-primary" id="playAgainBtn" onclick="resetRound()">Play again</button>
            <button class="btn-quiet"   onclick="resetScores()">Reset</button>
        </div>
    </section>

</main>

<script>
    /* ── Inline SVG icons (currentColor → each takes its move colour) ── */
    var ICON = {
        rock:
            '<svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">' +
              '<rect x="19" y="15" width="8" height="15" rx="4" fill="currentColor"/>' +
              '<rect x="28" y="13" width="8" height="17" rx="4" fill="currentColor"/>' +
              '<rect x="37" y="14" width="8" height="16" rx="4" fill="currentColor"/>' +
              '<rect x="46" y="17" width="7.5" height="13" rx="3.75" fill="currentColor"/>' +
              '<rect x="16" y="27" width="38" height="25" rx="11" fill="currentColor"/>' +
              '<rect x="10" y="33" width="13" height="13" rx="6.5" fill="currentColor"/>' +
            '</svg>',
        paper:
            '<svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">' +
              '<path d="M17 7h22l8 8v42H17z" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linejoin="round"/>' +
              '<path d="M39 7v8h8" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linejoin="round"/>' +
              '<line x1="23" y1="27" x2="41" y2="27" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>' +
              '<line x1="23" y1="35" x2="41" y2="35" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>' +
              '<line x1="23" y1="43" x2="35" y2="43" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>' +
            '</svg>',
        scissors:
            '<svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">' +
              '<circle cx="17" cy="45" r="7.5" fill="none" stroke="currentColor" stroke-width="3.4"/>' +
              '<circle cx="37" cy="45" r="7.5" fill="none" stroke="currentColor" stroke-width="3.4"/>' +
              '<line x1="22" y1="40" x2="54" y2="9"  stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/>' +
              '<line x1="32" y1="40" x2="10" y2="12" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/>' +
              '<circle cx="27.5" cy="33" r="2.6" fill="currentColor"/>' +
            '</svg>'
    };

    /* ── State ── */
    var scores = { wins: 0, losses: 0, ties: 0 };
    var busy = false;
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ── DOM ── */
    var tilesEl     = document.getElementById('tiles');
    var stageEl     = document.querySelector('.stage');
    var placeholder = document.getElementById('placeholder');
    var revealEl    = document.getElementById('reveal');
    var verdictEl   = document.getElementById('verdict');
    var actionsEl   = document.getElementById('actions');
    var confettiEl  = document.getElementById('confetti');
    var userIcon    = document.getElementById('userIcon');
    var cpuIcon     = document.getElementById('cpuIcon');
    var userName    = document.getElementById('userChoiceDisplay');
    var cpuName     = document.getElementById('computerChoiceDisplay');
    var resultText  = document.getElementById('resultText');
    var resultDetail= document.getElementById('resultDetail');

    /* Paint the move icons into the tiles */
    document.querySelector('#tileRock .tile-icon').innerHTML     = ICON.rock;
    document.querySelector('#tilePaper .tile-icon').innerHTML    = ICON.paper;
    document.querySelector('#tileScissors .tile-icon').innerHTML = ICON.scissors;

    /* ── Theme toggle (persists when run as a real file) ── */
    document.getElementById('themeToggle').addEventListener('click', function () {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('rps-theme', next); } catch (e) {}
    });

    /* ─────────────────────────────────────────────
       MAIN — original game logic, byte-for-byte.
       Only the presentation is sequenced/animated.
    ───────────────────────────────────────────── */
    function playGame(userChoice) {
        if (busy) return;
        busy = true;
        clearStage();
        placeholder.classList.add('hide');

        // ── original computer-pick logic (unchanged) ──
        var rand = Math.random();
        var computerChoice;
        if      (rand < 0.34)  computerChoice = 'rock';
        else if (rand <= 0.67) computerChoice = 'paper';
        else                   computerChoice = 'scissors';

        // ── original result logic (unchanged) ──
        var result = '';
        var detail = '';
        var resultClass = '';

        if (userChoice === computerChoice) {
            result = "It's a Tie!";
            detail = 'Great minds think alike.';
            resultClass = 'tie';
            scores.ties++;
        } else if (userChoice === 'rock') {
            if (computerChoice === 'scissors') {
                result = 'You Win! 🎉';
                detail = 'Rock crushes Scissors.';
                resultClass = 'winner';
                scores.wins++;
            } else {
                result = 'You Lose! 😢';
                detail = 'Paper covers Rock.';
                resultClass = 'loser';
                scores.losses++;
            }
        } else if (userChoice === 'paper') {
            if (computerChoice === 'rock') {
                result = 'You Win! 🎉';
                detail = 'Paper covers Rock.';
                resultClass = 'winner';
                scores.wins++;
            } else {
                result = 'You Lose! 😢';
                detail = 'Scissors cut Paper.';
                resultClass = 'loser';
                scores.losses++;
            }
        } else if (userChoice === 'scissors') {
            if (computerChoice === 'rock') {
                result = 'You Lose! 😢';
                detail = 'Rock crushes Scissors.';
                resultClass = 'loser';
                scores.losses++;
            } else {
                result = 'You Win! 🎉';
                detail = 'Scissors cut Paper.';
                resultClass = 'winner';
                scores.wins++;
            }
        }
        // ── end original logic ──

        // mark the chosen tile + dim the rest
        document.querySelectorAll('.tile').forEach(function (t) { t.classList.remove('selected'); });
        document.querySelector('.tile.' + userChoice).classList.add('selected');
        tilesEl.classList.add('busy');

        revealSequence(userChoice, computerChoice, result, detail, resultClass);
    }

    /* Show your hand, let the computer "shuffle", then settle + verdict */
    function revealSequence(userChoice, computerChoice, result, detail, resultClass) {
        stageEl.classList.add('show');
        setHand(userIcon, userName, userChoice);
        pop(userIcon);

        if (reduceMotion) {
            setHand(cpuIcon, cpuName, computerChoice);
            finishReveal(result, detail, resultClass);
            return;
        }

        // quick icon shuffle on the computer side
        cpuName.textContent = '';
        var moves = ['rock', 'paper', 'scissors'];
        var i = 0;
        var iv = setInterval(function () {
            var m = moves[i % 3]; i++;
            cpuIcon.className = 'hand-icon move-' + m;
            cpuIcon.innerHTML = ICON[m];
        }, 70);

        setTimeout(function () {
            clearInterval(iv);
            setHand(cpuIcon, cpuName, computerChoice);
            pop(cpuIcon);
            setTimeout(function () { finishReveal(result, detail, resultClass); }, 140);
        }, 520);
    }

    function finishReveal(result, detail, resultClass) {
        tilesEl.classList.remove('busy');

        verdictEl.className = 'verdict show ' + resultClass;
        resultText.textContent   = result;
        resultDetail.textContent = detail;

        setScore('scoreWins',   scores.wins,   resultClass === 'winner');
        setScore('scoreTies',   scores.ties,   resultClass === 'tie');
        setScore('scoreLosses', scores.losses, resultClass === 'loser');

        if (resultClass === 'winner') confettiBurst();

        actionsEl.classList.add('show');
        busy = false;
    }

    function setHand(iconEl, nameEl, move) {
        iconEl.className = 'hand-icon move-' + move;
        iconEl.innerHTML = ICON[move];
        nameEl.textContent = move;
    }

    function pop(el) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }

    function setScore(id, value, doBump) {
        var el = document.getElementById(id);
        el.textContent = value;
        if (doBump) { el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
    }

    /* soft pastel burst, win only, off under reduced motion */
    function confettiBurst() {
        if (reduceMotion) return;
        var palette = ['#15B881', '#F2A436', '#EF4E70', '#F2784B', '#3B9DF5', '#8B6CF0'];
        for (var i = 0; i < 24; i++) {
            var p = document.createElement('span');
            p.className = 'confetti-piece';
            var angle = Math.random() * Math.PI * 2;
            var dist  = 60 + Math.random() * 140;
            p.style.left = '50%';
            p.style.top  = '42%';
            p.style.background = palette[i % palette.length];
            p.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
            p.style.setProperty('--dy', (Math.sin(angle) * dist + 110) + 'px');
            p.style.animation = 'confettiFly ' + (850 + Math.random() * 400) + 'ms ease-out forwards';
            confettiEl.appendChild(p);
            (function (n) { setTimeout(function () { n.remove(); }, 1350); })(p);
        }
    }

    /* Play again — clears the round, keeps the score */
    function resetRound() {
        if (busy) return;
        clearStage();
        placeholder.classList.remove('hide');
    }

    function clearStage() {
        stageEl.classList.remove('show');
        cpuIcon.classList.remove('pop');
        userIcon.classList.remove('pop');
        verdictEl.className = 'verdict';
        resultText.textContent = '';
        resultDetail.textContent = '';
        actionsEl.classList.remove('show');
        tilesEl.classList.remove('busy');
        document.querySelectorAll('.tile').forEach(function (t) { t.classList.remove('selected'); });
    }

    /* Reset — wipes the board */
    function resetScores() {
        scores = { wins: 0, losses: 0, ties: 0 };
        document.getElementById('scoreWins').textContent   = '0';
        document.getElementById('scoreTies').textContent   = '0';
        document.getElementById('scoreLosses').textContent = '0';
        clearStage();
        placeholder.classList.remove('hide');
    }

    /* ── Keyboard: 1/2/3 to play, Enter/Space to play again ── */
    document.addEventListener('keydown', function (e) {
        var k = e.key;
        if (k === '1' || k === '2' || k === '3') {
            if (busy) return;
            e.preventDefault();
            playGame({ '1': 'rock', '2': 'paper', '3': 'scissors' }[k]);
        } else if (k === 'Enter' || k === ' ') {
            var ae = document.activeElement;
            if (ae && ae.tagName === 'BUTTON') return; // let the focused button handle it
            if (actionsEl.classList.contains('show') && !busy) {
                e.preventDefault();
                resetRound();
            }
        }
    });
</script>

</body>
</html>
